name: Deploy market brief to GitHub Pages

on:
  push:
    branches: [claude/local-area-marketing-visual-Mg7Bv]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          set -e
          mkdir -p _site
          # Brief lives at /  (index.html) and at its named path
          cp marketing/mission-bay-market-brief.html _site/index.html
          cp marketing/mission-bay-market-brief.html _site/mission-bay-market-brief.html
          cp -r marketing/assets _site/assets
          # If MAPBOX_TOKEN secret is set, generate config.local.js so the
          # URL doesn't need #mb=... appended.
          if [ -n "$MAPBOX_TOKEN" ]; then
            printf 'window.RESOURCE_MAPBOX_TOKEN=%s;\n' \
              "$(node -e 'process.stdout.write(JSON.stringify(process.env.MAPBOX_TOKEN))')" \
              > _site/config.local.js
            echo "✓ wrote config.local.js (token configured)"
          else
            echo "ℹ MAPBOX_TOKEN secret not set — visitors must append #mb=... to the URL"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
